services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/anime.db
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
    volumes:
      - app-data:/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:
