{% extends "base.html" %}
{% block title %}Поиск — AnimeList{% endblock %}

{% block content %}
<section class="mb-10">
    <h1 class="text-2xl font-semibold mb-6">Поиск</h1>
    <input type="search" name="q" value="{{ q }}" placeholder="Поиск аниме…" autocomplete="off"
           hx-get="/search" hx-trigger="input changed delay:400ms" hx-target="#grid"
           hx-indicator="#browse" hx-push-url="true"
           class="w-full max-w-xl bg-surface border border-edge rounded-md px-4 py-2.5
                  text-primary placeholder-secondary outline-none
                  focus:border-accent transition-colors duration-150">
</section>

<section id="browse">
    <div id="grid">{% include "_grid.html" %}</div>
    <div id="grid-skeleton" class="anime-grid">
        {% for _ in range(12) %}
        <div class="bg-surface border border-edge rounded-md overflow-hidden">
            <div class="aspect-[2/3] shimmer"></div>
            <div class="p-3 space-y-2">
                <div class="h-3 shimmer rounded w-4/5"></div>
                <div class="h-3 shimmer rounded w-2/5"></div>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
