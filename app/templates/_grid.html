{% from "_macros.html" import anime_card, feed_sentinel %}
{% if anime_list %}
<div class="anime-grid">
    {% for anime in anime_list %}{{ anime_card(anime, loop.index0 * 30) }}{% endfor %}
    {% if feed and has_more %}{{ feed_sentinel(page + 1) }}{% endif %}
</div>
{% else %}
<p class="text-secondary py-8">Ничего не нашлось. Попробуйте другой запрос.</p>
{% endif %}
