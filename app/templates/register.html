{% extends "base.html" %}
{% block title %}Регистрация — AnimeList{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12">
    <h1 class="text-2xl font-semibold mb-6">Регистрация</h1>
    {% if error %}
    <p class="mb-4 text-sm text-red-400 bg-red-400/10 border border-red-400/30 rounded-md px-3 py-2">{{ error }}</p>
    {% endif %}
    <form method="post" action="/register" class="space-y-4">
        <input name="username" value="{{ username or '' }}" placeholder="Имя пользователя" required
               class="w-full bg-surface border border-edge rounded-md px-4 py-2.5 placeholder-secondary
                      outline-none focus:border-accent transition-colors duration-150">
        <input name="password" type="password" placeholder="Пароль (мин. 6 символов)" required
               class="w-full bg-surface border border-edge rounded-md px-4 py-2.5 placeholder-secondary
                      outline-none focus:border-accent transition-colors duration-150">
        <button class="w-full bg-accent text-page font-semibold rounded-md py-2.5
                       hover:brightness-110 transition duration-150">Создать аккаунт</button>
    </form>
    <p class="mt-4 text-sm text-secondary">
        Уже есть аккаунт? <a href="/login" class="text-accent hover:brightness-110">Войти</a>
    </p>
</div>
{% endblock %}
