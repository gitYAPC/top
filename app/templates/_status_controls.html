<div id="list-controls" class="mt-6">
    {% if current_user %}
    <div class="flex flex-wrap gap-2">
        {% for status, label in statuses.items() %}
        <button hx-post="/anime/{{ anime.mal_id }}/status" hx-vals='{"status": "{{ status.value }}"}'
                hx-target="#list-controls" hx-swap="outerHTML"
                class="px-4 py-1.5 rounded-md border text-sm transition-colors duration-200
                       {% if rating and rating.status == status %}bg-{{ status.value }} border-transparent text-page font-semibold
                       {% else %}bg-surface border-edge text-secondary hover:text-primary hover:border-{{ status.value }}{% endif %}">
            {{ label }}
        </button>
        {% endfor %}
    </div>
    {% if rating %}
    <div class="mt-4 flex items-center gap-1">
        {% for i in range(1, 11) %}
        <button hx-post="/anime/{{ anime.mal_id }}/score" hx-vals='{"score": {{ i }}}'
                hx-target="#list-controls" hx-swap="outerHTML" aria-label="Оценка {{ i }}"
                class="text-xl leading-none transition-colors duration-150
                       {% if rating.score and i <= rating.score %}text-star{% else %}text-edge hover:text-star{% endif %}">★</button>
        {% endfor %}
        {% if rating.score %}<span class="ml-2 text-sm text-secondary">{{ rating.score }}/10</span>{% endif %}
    </div>
    {% endif %}
    {% else %}
    <p class="mt-2 text-sm text-secondary">
        <a href="/login" class="text-accent hover:brightness-110">Войдите</a>, чтобы добавить в список и оценить.
    </p>
    {% endif %}
</div>
